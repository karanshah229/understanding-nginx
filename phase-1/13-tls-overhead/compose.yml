services:
    nginx:
        container_name: nginx
        build: ./nginx
        ports:
            - "8080:8080"
            - "8443:8443"
        depends_on:
            - backend
        restart: always
        cpus: 1
        mem_limit: 512m
        networks:
            - tls-net

    backend:
        container_name: backend
        build: ./backend
        ports:
            - "8081:8080"
        cpus: 0.5
        mem_limit: 512m
        restart: always
        networks:
            - tls-net

networks:
    tls-net:
        driver: bridge
