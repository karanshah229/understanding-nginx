services:
    nginx:
        build: ./nginx
        ports:
            - "8080:8080"
        depends_on:
            - backend
        restart: always
        cpus: 0.5
        mem_limit: 128m
        networks:
            - spike-net

    backend:
        build: ./backend
        ports:
            - "8081:8080"
        cpus: 1
        mem_limit: 512m
        restart: always
        networks:
            - spike-net

networks:
    spike-net:
        driver: bridge
