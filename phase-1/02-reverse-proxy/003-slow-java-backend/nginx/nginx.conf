events {}

http {
    limit_conn_zone $binary_remote_addr zone=addr:10m;
    limit_req_zone $binary_remote_addr zone=req:10m rate=50r/s;

    upstream backend {
        server host.docker.internal:8081;
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://backend;
            limit_conn addr 100;
        }
    }
}
