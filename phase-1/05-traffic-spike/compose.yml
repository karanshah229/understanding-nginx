version: "3.9"

services:
    nginx:
        build: ./nginx
        ports:
            - "8080:8080"
        depends_on:
            - backend
        restart: always
        networks:
            - spike-net

    backend:
        build: ./backend
        ports:
            - "8081:8080"
        restart: always
        networks:
            - spike-net

networks:
    spike-net:
        driver: bridge
