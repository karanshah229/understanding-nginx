worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Scenario B: NGINX Rate Limit Zone
    limit_req_zone $binary_remote_addr zone=nginx_queue:10m rate=10r/s;

    # Shared upstream for scenarios
    upstream backend_fast {
        server backend:8080;
    }

    # Scenario A: Kernel Queue (Bottleneck at OS/Backlog)
    server {
        listen 8001 backlog=1; # Minimum possible backlog
        location / {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass http://backend_fast/fast;
        }
    }

    # Scenario B: NGINX Queue (Bottleneck at Application Layer)
    server {
        listen 8002;
        location / {
            limit_req zone=nginx_queue burst=20 delay=10; # Allow 20 burst, delay after 10
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass http://backend_fast/fast;
        }
    }

    # Scenario C: Backend Queue (Bottleneck at Upstream)
    server {
        listen 8003;
        location / {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass http://backend_fast/slow; # Hits the 500ms delay endpoint
        }
    }

    # Internal Telemetry Server
    server {
        listen 80;
        location /status {
            stub_status;
        }
    }
}
